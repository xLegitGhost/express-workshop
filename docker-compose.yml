version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: mariadb_sql
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: mi_api_db
    ports:
      - "3306:3306"
    volumes:
      # 1. Los datos locales (ignorados en Git)
      - ./db_data:/var/lib/mysql
      # 2. El "script" para crear tus tablas (SÍ va en Git)
      - ./init-db:/docker-entrypoint-initdb.d

volumes:
  db_data: